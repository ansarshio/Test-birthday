<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Happy Birthday - Special Message</title>
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Prevents accidental text selection during animations */
        }

        body {
            background: linear-gradient(145deg, #ff9a9e 0%, #fad0c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Pacifico', cursive, sans-serif;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        /* Main Card Container */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 60px 60px 80px 80px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.2), 0 0 0 12px rgba(255, 255, 200, 0.6);
            width: 100%;
            max-width: 800px;
            min-height: 550px;
            padding: 2rem 2rem 3rem;
            transition: all 0.3s ease;
            text-align: center;
        }

        /* Pages container */
        .pages-container {
            position: relative;
            width: 100%;
            min-height: 450px;
        }

        .page-view {
            transition: opacity 0.5s ease-in-out, transform 0.4s ease;
            width: 100%;
        }

        .hidden {
            display: none;
        }

        /* Message styling for typewriter */
        .pacifico-message {
            font-family: 'Pacifico', cursive;
            font-size: 1.8rem;
            font-weight: normal;
            color: #b83b5e;
            text-shadow: 3px 3px 8px rgba(255,215,150,0.8);
            line-height: 1.4;
            word-break: break-word;
            white-space: pre-wrap;
            margin-bottom: 1.5rem;
        }

        /* Button */
        .next-btn {
            background: #ff5e7c;
            border: none;
            font-size: 1.8rem;
            font-family: 'Pacifico', cursive;
            padding: 12px 35px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 0 #aa2e4e;
            transition: 0.07s linear;
            margin-top: 40px;
            width: auto;
            display: inline-block;
        }

        .next-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #aa2e4e;
        }

        /* Cursor blink effect for typewriter */
        .typewriter-cursor {
            display: inline-block;
            width: 3px;
            height: 1.8rem;
            background-color: #b83b5e;
            margin-left: 5px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .card {
                padding: 1.5rem;
            }
            .pacifico-message {
                font-size: 1.4rem;
            }
            .next-btn {
                font-size: 1.4rem;
                padding: 10px 28px;
            }
        }

        /* Page 1 special intro */
        .intro-name {
            font-family: 'Pacifico', cursive;
            font-size: 2.5rem;
            margin: 20px 0;
            color: #c44569;
        }
        .birthday-emoji {
            font-size: 5rem;
            display: block;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="pages-container">
        <!-- PAGE 1 -->
        <div id="page1" class="page-view">
            <div class="birthday-emoji">🎂🎈✨</div>
            <div class="intro-name">Happy Birthday, Love!</div>
            <div class="pacifico-message" id="line1" style="font-size:1.9rem;"></div>
            <div class="pacifico-message" id="line2" style="font-size:1.9rem;"></div>
            <button id="nextBtn" class="next-btn">Next 💖</button>
        </div>

        <!-- PAGE 2 (Text will appear with typewriter style) -->
        <div id="page2" class="page-view hidden">
            <div class="message-content" style="max-width: 700px; margin: 0 auto;">
                <div class="pacifico-message" id="p2-line1" style="margin-bottom: 1.2rem;"></div>
                <div class="pacifico-message" id="p2-line2" style="margin-bottom: 1.2rem;"></div>
                <div class="pacifico-message" id="p2-line3" style="margin-bottom: 1.2rem;"></div>
                <div class="pacifico-message" id="p2-line4" style="margin-bottom: 0;"></div>
            </div>
            <!-- Optional: you can remove next button on page2 or keep it as finish -->
            <button id="finishBtn" class="next-btn" style="background:#b3415f; margin-top:45px;">💕 Love You 💕</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // --------------------------------
        // 1. TEXT for PAGE 1 (typewriter already working)
        const page1Lines = [
            "You're the most beautiful chapter of my life ✨",
            "Every day with you feels like a celebration 💕"
        ];

        // 2. TEXT for PAGE 2 (your custom message, split naturally)
        //    Change this array to whatever you want!
        const page2MessageLines = [
            "On your special day, I just want to say...",
            "You light up my world like nobody else. 🌟",
            "May your year be filled with laughter, joy, and endless cake! 🎂",
            "I love you more than all the stars in the sky. 💖"
        ];

        // DOM elements
        const page1Div = document.getElementById('page1');
        const page2Div = document.getElementById('page2');
        const nextBtn = document.getElementById('nextBtn');
        const finishBtn = document.getElementById('finishBtn');

        // Page 1 line containers
        const line1El = document.getElementById('line1');
        const line2El = document.getElementById('line2');

        // Page 2 line containers
        const p2Line1 = document.getElementById('p2-line1');
        const p2Line2 = document.getElementById('p2-line2');
        const p2Line3 = document.getElementById('p2-line3');
        const p2Line4 = document.getElementById('p2-line4');

        // Helper: typewriter effect on a single element
        async function typewriter(element, text, speed = 45) {
            if (!element) return;
            element.innerHTML = ''; // clear previous content if any
            let i = 0;
            // add cursor placeholder
            const cursorSpan = document.createElement('span');
            cursorSpan.className = 'typewriter-cursor';
            cursorSpan.textContent = '';
            element.appendChild(cursorSpan);
            
            while (i < text.length) {
                // insert character before cursor
                const char = text[i];
                const textNode = document.createTextNode(char);
                element.insertBefore(textNode, cursorSpan);
                i++;
                await new Promise(resolve => setTimeout(resolve, speed));
            }
            // remove cursor after finishing
            if (cursorSpan && cursorSpan.parentNode) cursorSpan.remove();
        }

        // Function to start Page 1 typewriter
        async function startPage1Typewriter() {
            await typewriter(line1El, page1Lines[0], 40);
            await typewriter(line2El, page1Lines[1], 40);
        }

        // Function to start Page 2 typewriter (dynamic lines)
        async function startPage2Typewriter() {
            const page2Elements = [p2Line1, p2Line2, p2Line3, p2Line4];
            // Clear all before starting (to avoid overlaps)
            for (let el of page2Elements) {
                if (el) el.innerHTML = '';
            }
            // Write each line in sequence
            for (let idx = 0; idx < page2MessageLines.length; idx++) {
                if (page2Elements[idx]) {
                    await typewriter(page2Elements[idx], page2MessageLines[idx], 42);
                }
            }
        }

        // ---------- PAGE 1 INITIAL ANIMATION (when page loads) ----------
        // We need to run page1 typewriter as soon as possible
        startPage1Typewriter();

        // ---------- NEXT BUTTON (navigate to page 2 + start page2 typewriter) ----------
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                // Play subtle sound simulation (optional, but confetti is there)
                // Trigger confetti burst
                canvasConfetti({ particleCount: 130, spread: 70, origin: { y: 0.6 } });
                
                // Add button press effect
                nextBtn.style.transform = 'scale(0.95)';
                setTimeout(() => { if(nextBtn) nextBtn.style.transform = ''; }, 150);
                
                // Switch pages after a tiny delay
                setTimeout(() => {
                    page1Div.classList.add('hidden');
                    page2Div.classList.remove('hidden');
                    
                    // START TYPEWRITER ON PAGE 2 - exactly same style as page 1
                    startPage2Typewriter();
                    
                    // Extra confetti for celebration
                    canvasConfetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
                }, 300);
            });
        }

        // Finish button (just for fun, triggers more confetti)
        if (finishBtn) {
            finishBtn.addEventListener('click', () => {
                canvasConfetti({ particleCount: 300, spread: 120, origin: { y: 0.5 }, startVelocity: 18 });
                // optional alert or nothing
                finishBtn.style.transform = 'scale(0.95)';
                setTimeout(() => { if(finishBtn) finishBtn.style.transform = ''; }, 150);
            });
        }
        
        // also ensure if someone reloads page2 hidden remains correct
        // Edge: if by some chance page2 is visible without animation (not possible with our logic)
        // But adding a safety: if page2 is not hidden on load, but it is hidden by default so fine.
    })();
</script>
</body>
</html>
